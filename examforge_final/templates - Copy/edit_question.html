{% extends "base.html" %}
{% block title %}Edit Question — ExamForge{% endblock %}
{% block content %}
<div class="page-header">
  <h1 class="page-title">✏️ Edit Question</h1>
</div>

<div class="card" style="max-width:700px;margin:0 auto">
  <div class="card-header"><span class="card-title">Question Details</span></div>
  <div class="card-body">
    <form method="POST">
      <input type="hidden" name="test_id" value="{{ q.TestID }}">
      <div class="form-group">
        <label class="form-label">Question Text *</label>
        <textarea class="form-control" name="question_text" rows="3" required>{{ q.QuestionText }}</textarea>
      </div>
      <div class="form-row">
        <div class="form-group">
          <label class="form-label">Option A</label>
          <input class="form-control" name="option_a" value="{{ q.OptionA }}" required>
        </div>
        <div class="form-group">
          <label class="form-label">Option B</label>
          <input class="form-control" name="option_b" value="{{ q.OptionB }}" required>
        </div>
      </div>
      <div class="form-row">
        <div class="form-group">
          <label class="form-label">Option C</label>
          <input class="form-control" name="option_c" value="{{ q.OptionC }}" required>
        </div>
        <div class="form-group">
          <label class="form-label">Option D</label>
          <input class="form-control" name="option_d" value="{{ q.OptionD }}" required>
        </div>
      </div>
      <div class="form-row">
        <div class="form-group">
          <label class="form-label">Correct Option</label>
          <select class="form-control" name="correct_option" required>
            {% for opt in ['A','B','C','D'] %}
            <option value="{{ opt }}" {{ 'selected' if q.CorrectOption == opt }}>{{ opt }}</option>
            {% endfor %}
          </select>
        </div>
        <div class="form-group">
          <label class="form-label">Marks</label>
          <input class="form-control" name="marks" type="number" min="1" value="{{ q.Marks }}">
        </div>
        <div class="form-group">
          <label class="form-label">Negative Marks</label>
          <input class="form-control" name="negative_marks" type="number" min="0" step="0.25" value="{{ q.NegativeMarks }}">
        </div>
      </div>
      <div class="form-group">
        <label class="form-label">Explanation</label>
        <textarea class="form-control" name="explanation" rows="2">{{ q.Explanation or '' }}</textarea>
      </div>
      <div class="flex gap-2 mt-4">
        <button type="submit" class="btn btn-primary">Update Question</button>
        <a href="{{ url_for('questions', test_id=q.TestID) }}" class="btn btn-secondary">Cancel</a>
      </div>
    </form>
  </div>
</div>
{% endblock %}
