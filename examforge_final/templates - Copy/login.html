<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1"/>
  <title>Login — ExamForge</title>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    :root{--bg:#0d0f14;--surface:#161a22;--surface2:#1e2330;--border:#2a3040;--accent:#4f8ef7;--accent2:#7c5cfc;--danger:#ef4444;--success:#22c55e;--text:#e8ecf4;--muted:#8892a4}
    *{box-sizing:border-box;margin:0;padding:0}
    body{background:var(--bg);color:var(--text);font-family:'DM Sans',sans-serif;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:1rem}
    body::before{content:'';position:fixed;inset:0;background:radial-gradient(ellipse 80% 60% at 50% 0%,rgba(79,142,247,.12) 0%,transparent 70%);pointer-events:none}

    .login-box{background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:2.5rem;width:100%;max-width:400px;box-shadow:0 40px 80px rgba(0,0,0,.5);position:relative}
    .brand{font-family:'Syne',sans-serif;font-weight:800;font-size:1.8rem;text-align:center;margin-bottom:.3rem}
    .brand span{color:var(--accent)}
    .brand-sub{text-align:center;color:var(--muted);font-size:.88rem;margin-bottom:2rem}

    .alert{padding:.75rem 1rem;border-radius:8px;margin-bottom:1.2rem;font-size:.88rem;border-left:3px solid}
    .alert-danger{background:rgba(239,68,68,.1);border-color:var(--danger);color:#fca5a5}
    .alert-success{background:rgba(34,197,94,.1);border-color:var(--success);color:#86efac}
    .alert-info{background:rgba(79,142,247,.1);border-color:var(--accent);color:#93c5fd}

    .form-group{margin-bottom:1.2rem}
    .form-label{display:block;font-size:.83rem;color:var(--muted);font-weight:500;margin-bottom:.4rem}
    .form-control{width:100%;background:var(--surface2);border:1px solid var(--border);border-radius:8px;padding:.7rem 1rem;color:var(--text);font-size:.9rem;font-family:'DM Sans',sans-serif;transition:border-color .2s}
    .form-control:focus{outline:none;border-color:var(--accent);box-shadow:0 0 0 3px rgba(79,142,247,.15)}
    .form-control::placeholder{color:var(--muted)}

    .btn{display:block;width:100%;padding:.8rem;border-radius:8px;border:none;background:var(--accent);color:#fff;font-size:.95rem;font-weight:600;cursor:pointer;font-family:'Syne',sans-serif;transition:all .2s;letter-spacing:.3px}
    .btn:hover{background:#3a7ded;transform:translateY(-1px);box-shadow:0 8px 20px rgba(79,142,247,.3)}

    .demo-hint{margin-top:1.5rem;background:var(--surface2);border-radius:8px;padding:1rem;font-size:.8rem;color:var(--muted)}
    .demo-hint strong{color:var(--text);display:block;margin-bottom:.4rem;font-size:.82rem}
    .demo-item{display:flex;justify-content:space-between;padding:.2rem 0;border-bottom:1px solid var(--border)}
    .demo-item:last-child{border-bottom:none}
    .demo-role{color:var(--accent);font-weight:500}
  </style>
</head>
<body>
<div class="login-box">
  <div class="brand">Exam<span>Forge</span></div>
  <div class="brand-sub">Secure Online Examination Platform</div>

  {% for cat, msg in get_flashed_messages(with_categories=true) %}
  <div class="alert alert-{{ cat }}">{{ msg }}</div>
  {% endfor %}

  <form method="POST" action="{{ url_for('login') }}">
    <div class="form-group">
      <label class="form-label">Email Address</label>
      <input class="form-control" type="email" name="email" placeholder="you@examforge.edu" required autofocus>
    </div>
    <div class="form-group">
      <label class="form-label">Password</label>
      <input class="form-control" type="password" name="password" placeholder="••••••••" required>
    </div>
    <button class="btn" type="submit">Sign In →</button>
  </form>

  <div class="demo-hint">
    <strong>Sample Accounts (password: password123)</strong>
    <div class="demo-item"><span>admin@examforge.edu</span><span class="demo-role">admin</span></div>
    <div class="demo-item"><span>priya@examforge.edu</span><span class="demo-role">instructor</span></div>
    <div class="demo-item"><span>leela@examforge.edu</span><span class="demo-role">incharge</span></div>
    <div class="demo-item"><span>s1@examforge.edu</span><span class="demo-role">student</span></div>
  </div>
</div>
</body>
</html>
